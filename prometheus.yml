global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'crv-api-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'crv-api'
    static_configs:
      - targets: ['crv-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
