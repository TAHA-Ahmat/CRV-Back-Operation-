version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: crv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - crv-network
    depends_on:
      - crv-api

  grafana:
    image: grafana/grafana:latest
    container_name: crv-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/crv.json
      - ./grafana-datasource.json:/etc/grafana/provisioning/datasources/prometheus.json
    networks:
      - crv-network
    depends_on:
      - prometheus

  crv-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crv-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - SENTRY_DSN=${SENTRY_DSN}
    networks:
      - crv-network
    expose:
      - "8000"

volumes:
  prometheus_data:
  grafana_data:

networks:
  crv-network:
    driver: bridge
